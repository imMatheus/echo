name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: echo
          POSTGRES_DB: echo
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Dependency audit (high and critical)
        run: bun audit --audit-level=high
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun run test
      - name: Build
        run: bun run build
      - name: Build production container
        run: docker build --file apps/server/Dockerfile --tag echo-ci:${{ github.sha }} .
      - name: Schema upgrade smoke test
        env:
          DATABASE_URL: postgres://echo:echo@127.0.0.1:5433/echo
        run: bun apps/server/test/schema-upgrade-smoke.ts
      - name: End-to-end smoke test
        env:
          DATABASE_URL: postgres://echo:echo@127.0.0.1:5433/echo
          DISABLE_SIGNUP: "false"
          EMBEDDINGS_PROVIDER: none
          HOST: 127.0.0.1
          LOG_LEVEL: info
          NODE_ENV: production
        run: |
          set -Eeuo pipefail

          server_log="${RUNNER_TEMP}/echo-server.log"
          bun run start >"${server_log}" 2>&1 &
          server_pid=$!

          cleanup() {
            status=$?
            if [[ ${status} -ne 0 ]]; then
              echo "::group::Echo server logs"
              cat "${server_log}"
              echo "::endgroup::"
            fi
            kill "${server_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
            exit "${status}"
          }
          trap cleanup EXIT

          ready=false
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/api/v1/health >/dev/null 2>&1; then
              ready=true
              break
            fi
            if ! kill -0 "${server_pid}" 2>/dev/null; then
              echo "Echo server exited before becoming healthy"
              exit 1
            fi
            sleep 1
          done

          if [[ ${ready} != true ]]; then
            echo "Echo server did not become healthy within 30 seconds"
            exit 1
          fi

          bun apps/server/test/schema-smoke.ts
          node scripts/smoke.mjs
      - name: Hybrid search and revocation-race smoke test
        env:
          DATABASE_URL: postgres://echo:echo@127.0.0.1:5433/echo
          EMBEDDINGS_PROVIDER: openai
          HOST: 127.0.0.1
          LOG_LEVEL: info
          NODE_ENV: production
          OPENAI_API_KEY: test
          OPENAI_BASE_URL: http://127.0.0.1:9999
          PORT: 3247
        run: |
          set -Eeuo pipefail

          mock_log="${RUNNER_TEMP}/echo-mock-embeddings.log"
          server_log="${RUNNER_TEMP}/echo-vector-server.log"
          node scripts/mock-embeddings.mjs >"${mock_log}" 2>&1 &
          mock_pid=$!
          bun run start >"${server_log}" 2>&1 &
          server_pid=$!

          cleanup() {
            status=$?
            if [[ ${status} -ne 0 ]]; then
              echo "::group::Vector server logs"
              cat "${server_log}"
              cat "${mock_log}"
              echo "::endgroup::"
            fi
            kill "${server_pid}" "${mock_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
            wait "${mock_pid}" 2>/dev/null || true
            exit "${status}"
          }
          trap cleanup EXIT

          ready=false
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3247/api/v1/health >/dev/null 2>&1; then
              ready=true
              break
            fi
            if ! kill -0 "${server_pid}" 2>/dev/null; then
              echo "Vector Echo server exited before becoming healthy"
              exit 1
            fi
            sleep 1
          done

          if [[ ${ready} != true ]]; then
            echo "Vector Echo server did not become healthy within 30 seconds"
            exit 1
          fi

          node scripts/smoke-vector.mjs
