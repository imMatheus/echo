# Load server settings with:
# docker compose --env-file apps/server/.env up -d --build
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    volumes:
      - echo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runtime
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://echo:echo@db:5432/echo}
      APP_URL: ${APP_URL:-}
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: "${EMAIL_FROM:-Echo <onboarding@resend.dev>}"
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-none}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  echo-db-data:
