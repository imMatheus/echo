# Development database only: docker compose -f docker-compose.dev.yml up -d
# Matches the default DATABASE_URL (postgres://echo:echo@localhost:5433/echo).
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    volumes:
      - echo-db-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  echo-db-dev:
